# Base model to fine-tune
model_name: google/gemma-2-2b-it

# Where to save checkpoints during training
output_dir: checkpoints/gemma-tool

# LoRA adapter settings
lora_r: 16          # Rank: controls adapter size. 16 = good quality/memory balance
lora_alpha: 32      # Scaling factor: always 2x lora_r
lora_dropout: 0.05  # Randomly zero out 5% of adapter weights to prevent overfitting
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training hyperparameters
learning_rate: 0.0002
per_device_train_batch_size: 1
per_device_eval_batch_size: 1          # eval OOMs at default=8 with Gemma 2's 256k vocab
gradient_accumulation_steps: 16        # Effective batch = 1 * 16 = 16
num_train_epochs: 1
warmup_ratio: 0.05
lr_scheduler_type: cosine
bf16: true

# Data
train_file: data/train.jsonl
val_file: data/val.jsonl
max_seq_length: 1024     # explicit — without this SFTConfig defaults to model max (8192)
max_train_samples: 800   # set to null to train on full dataset (~54k examples)

# Logging
logging_steps: 5
save_steps: 10
eval_steps: 10
save_total_limit: 3
wandb_project: tool-use-specialist

# Hugging Face Hub
hub_model_id: Sahil3717/gemma-2-2b-tool-use-lora
